name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  preview-gates:
    name: Preview gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies (deterministic)
        run: pnpm install --frozen-lockfile
      - name: Lint, test, and build
        run: |
          pnpm lint
          pnpm test
          pnpm build
      - uses: docker/setup-buildx-action@v3
      - name: Build API container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: meatland/api:preview
      - name: Build customer portal container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/customer-portal.Dockerfile
          push: false
          tags: meatland/customer-portal:preview
      - name: Validate release gate documentation reference
        run: |
          test -f docs/ci-cd-release-gates.md
          grep -q "Playwright" docs/ci-cd-release-gates.md
