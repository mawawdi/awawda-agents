name: Squad Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Verify lockfile is committed
        run: |
          test -f pnpm-lock.yaml
          git ls-files --error-unmatch pnpm-lock.yaml >/dev/null
      - name: Install dependencies (deterministic)
        run: pnpm install --frozen-lockfile
      - name: Verify release quality gates
        run: |
          pnpm lint
          pnpm test
          pnpm build
      - uses: docker/setup-buildx-action@v3
      - name: Build API container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: meatland/api:main
      - name: Build customer portal container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/customer-portal.Dockerfile
          push: false
          tags: meatland/customer-portal:main
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -e \"console.log(require('./package.json').version)\")"
          NOTES_FILE=.github/release-notes.txt
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{flag=($0 ~ "^## \\["substr("'"$VERSION"'",2)"\\]")}; flag {print}' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Automated release for $VERSION." > "$NOTES_FILE"
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" --notes-file "$NOTES_FILE"
          else
            gh release create "$VERSION" --target "$GITHUB_SHA" --notes-file "$NOTES_FILE"
          fi
