name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

concurrency:
  group: squad-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workspace-checks:
    name: Workspace • ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        check: [lint, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Verify lockfile is committed
        run: |
          test -f pnpm-lock.yaml
          git ls-files --error-unmatch pnpm-lock.yaml >/dev/null
      - name: Install dependencies (deterministic)
        run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.check }}
        run: pnpm ${{ matrix.check }}

  container-build-api:
    name: Container • API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: workspace-checks
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: meatland/api:ci

  container-build-portal:
    name: Container • Customer Portal
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: workspace-checks
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build customer portal container artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/customer-portal.Dockerfile
          push: false
          tags: meatland/customer-portal:ci
